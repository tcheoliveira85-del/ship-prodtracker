async function sGet(k, fb) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; }
}
async function sSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error(e); }
}

const PERIODOS = ["01x07", "07x13", "13x19", "19x01"];
const EQUIPES = ["A", "B", "C", "D"];
const HMAP = {
  "01x07": [["01","02"],["02","03"],["03","04"],["04","05"],["05","06"],["06","07"]],
  "07x13": [["07","08"],["08","09"],["09","10"],["10","11"],["11","12"],["12","13"]],
  "13x19": [["13","14"],["14","15"],["15","16"],["16","17"],["17","18"],["18","19"]],
  "19x01": [["19","20"],["20","21"],["21","22"],["22","23"],["23","00"],["00","01"]],
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ── Escala automática ── */
function getEquipe(dateStr, periodo) {
  // Reference: 01/01/2026
  // 07x13/13x19: [C,C,D,D,A,A,B,B] cycle -> pos=floor(days/2)%4 -> [C,D,A,B]
  // 19x01: [B,B,C,C,D,D,A,A] -> pos=floor(days/2)%4 -> [B,C,D,A]
  // 01x07: [A,B,B,C,C,D,D,A] -> pos=floor((days-1)/2)%4 -> [B,C,D,A] (shifted 1 day)
  const ref = new Date(2026, 0, 1);
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  const diffDays = Math.floor((date - ref) / 86400000);
  const dayTeams = ["C", "D", "A", "B"];
  const nightTeams = ["B", "C", "D", "A"];
  if (periodo === "07x13" || periodo === "13x19") {
    const pos = ((Math.floor(diffDays / 2) % 4) + 4) % 4;
    return dayTeams[pos];
  }
  if (periodo === "19x01") {
    const pos = ((Math.floor(diffDays / 2) % 4) + 4) % 4;
    return nightTeams[pos];
  }
  // 01x07: shifted by -1 day
  const pos01 = ((Math.floor((diffDays - 1) / 2) % 4) + 4) % 4;
  return nightTeams[pos01];
}

function mkShip() {
  return {
    id: uid(), navio: "", viagem: "", berco: "", produto: "Celulose", customProds: [],
    totalUn: 0, pesoUn: 2, numTernos: 2,
    ternos: [{ id: uid(), nome: "1º Terno" }, { id: uid(), nome: "2º Terno" }],
    poroes: [], periodos: [], createdAt: new Date().toISOString(),
  };
}

function mkLinhas(per, ternos) {
  return (HMAP[per] || []).map(([a, b]) => ({
    id: uid(), h1: a, h2: b,
    td: ternos.map(t => ({ tid: t.id, un: 0, ca: 0, porId: null, extra: [] })),
    pars: [],
  }));
}

function App() {
  const [tm, setTm] = useState("light");
  const [ship, setShip] = useState(null);
  const [hist, setHist] = useState([]);
  const [vw, setVw] = useState("home");
  const [hDet, setHDet] = useState(null);
  const [toast, setToast] = useState("");
  const [load, setLoad] = useState(true);
  const [showChart, setShowChart] = useState(false);
  const [showBalance, setShowBalance] = useState(false);
  const [collPers, setCollPers] = useState({}); // {pi: true} for collapsed periods
  const [confirmDel, setConfirmDel] = useState(null); // pi to confirm delete
  const [confirmFin, setConfirmFin] = useState(false);
  const [showNewProd, setShowNewProd] = useState(false);
  const [newProd, setNewProd] = useState("");
  const [showPeso, setShowPeso] = useState(false);
  // delay modal
  const [dm, setDm] = useState(null);
  const [dmC, setDmC] = useState("SM");
  const [dmD, setDmD] = useState("Safety Meeting (DDS)");
  const [dmT, setDmT] = useState("Geral");
  const [dmI, setDmI] = useState("");
  const [dmF, setDmF] = useState("");
  const [dmM, setDmM] = useState(0);
  // guincheiro modal
  const [gm, setGm] = useState(null); // {pi} or null
  const [gv, setGv] = useState({});
  const [copyText, setCopyText] = useState(null); // text to show in copy modal

  const t = TH[tm];
  const tc = i => [t.t1, t.t2, t.t3][i % 3];

  useEffect(() => {
    (async () => {
      setTm(await sGet("sp3-tm", "light"));
      const sh = await sGet("sp3-ship", null);
      if (sh) setShip(sh);
      setHist(await sGet("sp3-hist", []));
      setLoad(false);
    })();
  }, []);

  const sv = useCallback(async (s) => { setShip(s); await sSet("sp3-ship", s); }, []);
  const svH = useCallback(async (h) => { setHist(h); await sSet("sp3-hist", h); }, []);
  const togTm = async () => { const n = tm === "light" ? "dark" : "light"; setTm(n); await sSet("sp3-tm", n); };
  const fl = m => { setToast(m); setTimeout(() => setToast(""), 2500); };

  // ── Calc ──
  function calc(s) {
    if (!s) return { emb: 0, eTon: 0, ca: 0, saldo: 0, sTon: 0, pct: 0, mH: 0, hOp: 0, etc: null, pLiq: 0, plan: 0 };
    let emb = 0, ca = 0, hOp = 0;
    const pw = s.pesoUn || 2;
    s.periodos.forEach(p => p.linhas.forEach(l => {
      let lu = 0;
      l.td.forEach(x => {
        lu += (x.un || 0); ca += (x.ca || 0);
        if (x.extra) x.extra.forEach(e => { lu += (e.un || 0); ca += (e.ca || 0); });
      });
      emb += lu;
      if (lu > 0) hOp++;
    }));
    const eTon = emb * pw, plan = (s.totalUn || 0) * pw;
    const saldo = (s.totalUn || 0) - emb, sTon = saldo * pw;
    const pct = s.totalUn > 0 ? (emb / s.totalUn) * 100 : 0;
    const mH = hOp > 0 ? emb / hOp : 0, pLiq = hOp > 0 ? eTon / hOp : 0;
    let etc = null;
    if (mH > 0 && saldo > 0) etc = new Date(Date.now() + (saldo / mH) * 3600000);
    return { emb, eTon, ca, saldo, sTon, pct, mH, hOp, etc, pLiq, plan };
  }

  function tTot(s, tid) {
    let u = 0, a = 0;
    s.periodos.forEach(p => p.linhas.forEach(l => {
      const x = l.td.find(z => z.tid === tid);
      if (x) {
        u += (x.un || 0); a += (x.ca || 0);
        if (x.extra) x.extra.forEach(e => { u += (e.un || 0); a += (e.ca || 0); });
      }
    }));
    return { u, ton: u * (s.pesoUn || 2), a };
  }

  function hTot(l, pw) {
    let u = 0, a = 0;
    l.td.forEach(x => {
      u += (x.un || 0); a += (x.ca || 0);
      if (x.extra) x.extra.forEach(e => { u += (e.un || 0); a += (e.ca || 0); });
    });
    return { u, ton: u * pw, a };
  }

  function pTot(per, tid, pw) {
    let u = 0, a = 0;
    per.linhas.forEach(l => {
      const x = l.td.find(z => z.tid === tid);
      if (x) {
        u += (x.un || 0); a += (x.ca || 0);
        if (x.extra) x.extra.forEach(e => { u += (e.un || 0); a += (e.ca || 0); });
      }
    });
    return { u, ton: u * pw, a };
  }

  function porPerf(s) {
    if (!s || !s.poroes || !s.poroes.length) return [];
    const pw = s.pesoUn || 2;
    return s.poroes.map(po => {
      let tot = 0, hrs = new Set();
      s.periodos.forEach(p => p.linhas.forEach((l, li) => {
        l.td.forEach(x => {
          if (x.porId === po.id && (x.un || 0) > 0) { tot += (x.un || 0); hrs.add(p.id + "-" + li); }
          if (x.extra) x.extra.forEach(e => {
            if (e.porId === po.id && (e.un || 0) > 0) { tot += (e.un || 0); hrs.add(p.id + "-" + li); }
          });
        });
      }));
      const h = hrs.size || 0;
      return { id: po.id, nome: po.nome, tot, ton: tot * pw, mH: h > 0 ? tot / h : 0, tH: h > 0 ? (tot * pw) / h : 0 };
    });
  }

  // ── WhatsApp ──
  function genTx(s) {
    const c = calc(s), pw = s.pesoUn || 2;
    let tx = `🚢 *${s.navio}* — Viagem ${s.viagem}\n📦 ${s.produto}\n📐 Planejado: ${c.plan.toLocaleString("pt-BR")} mt\n\n`;
    s.periodos.forEach(p => {
      tx += `📅 ${p.data} | ${p.periodo} | Eq. ${p.equipe}\n`;
      if (p.guincheiros) {
        const gs = Object.entries(p.guincheiros).filter(([, v]) => v);
        if (gs.length) tx += `👷 ${gs.map(([k, v]) => { const tn = s.ternos.find(x => x.id === k); return (tn?.nome || "") + ": " + v; }).join(" | ")}\n`;
      }
      tx += `───────────\n`;
      p.linhas.forEach(l => {
        const ht = hTot(l, pw);
        if (ht.u > 0) {
          tx += `${l.h1}x${l.h2} → `;
          l.td.forEach((td, i) => {
            const allUn = (td.un || 0) + ((td.extra || []).reduce((s, e) => s + (e.un || 0), 0));
            const allCa = (td.ca || 0) + ((td.extra || []).reduce((s, e) => s + (e.ca || 0), 0));
            if (allUn > 0) {
              const po = s.poroes.find(x => x.id === td.porId);
              tx += `${s.ternos[i]?.nome}${po ? "[" + po.nome + "]" : ""}: ${allUn}un/${allUn * pw}mt/${allCa}ca  `;
            }
          });
          tx += `| ${ht.u}un/${ht.ton}mt/${ht.a}ca\n`;
        }
        if (l.pars && l.pars.length) l.pars.forEach(par => {
          tx += `  ⚠️ ${par.cod}(${par.terno}): ${par.desc} ${par.ini}→${par.fim} ${par.min}min\n`;
        });
      });
      tx += "\n";
    });
    tx += `═══════════\n📊 *RESUMO*\n📐 Planejado: ${c.plan.toLocaleString("pt-BR")} mt\n✅ Embarcado: ${c.emb.toLocaleString("pt-BR")} un / ${c.eTon.toLocaleString("pt-BR")} mt\n📦 Saldo: ${c.sTon.toLocaleString("pt-BR")} mt\n🚛 Autos: ${c.ca}\n📈 ${c.pct.toFixed(1)}%\n⚡ ${c.mH.toFixed(1)} un/h | ${c.pLiq.toFixed(1)} mt/h\n`;
    if (c.etc) tx += `🕐 ETC: ${c.etc.toLocaleDateString("pt-BR")} ${c.etc.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}\n`;
    tx += `\n_Ship ProdTracker v${VER} · Portocel_`;
    return tx;
  }

  function share() {
    const tx = genTx(ship);
    if (navigator.share) navigator.share({ text: tx }).catch(() => { });
    else navigator.clipboard.writeText(tx).then(() => fl("Copiado!")).catch(() => { });
  }

  // ── Relatório Cliente (6h) ──
  function genClient() {
    if (!ship || !ship.periodos || !ship.periodos.length) { fl("Nenhum período registrado"); return; }
    try {
      const s = ship;
      const pw = s.pesoUn || 2;
      const c = calc(s);
      const per = s.periodos[s.periodos.length - 1];
      const [y, m, d] = (per.data || "").split("-");
      const dataFmt = d && m && y ? `${d}/${m}/${y}` : "—";
      let tx = `*M/V ${s.navio} Voy.${s.viagem}*\n`;
      tx += `Berço: ${s.berco || "32"}\n\n`;
      tx += `*Data/Período: ${dataFmt} – ${per.periodo}*\n`;
      s.ternos.forEach((tn, ti) => {
        const pt = pTot(per, tn.id, pw);
        const porIds = new Set();
        (per.linhas || []).forEach(l => {
          const td = (l.td || [])[ti];
          if (td && td.porId && (td.un || 0) > 0) porIds.add(td.porId);
          if (td && td.extra) td.extra.forEach(e => { if (e && e.porId && (e.un || 0) > 0) porIds.add(e.porId); });
        });
        const porLabels = [...porIds].map(pid => {
          const po = s.poroes.find(p => p.id === pid);
          return po ? po.nome.replace("Porão #", "") : "?";
        });
        const porLabel = porLabels.length > 0 ? porLabels.join("/") : "—";
        tx += `${tn.nome} (#${porLabel}) - ${pt.ton.toLocaleString("pt-BR")} mt\n`;
      });
      let perUn = 0;
      (per.linhas || []).forEach(l => { (l.td || []).forEach(x => { perUn += (x.un || 0); if (x.extra) x.extra.forEach(e => perUn += (e ? e.un || 0 : 0)); }); });
      const perTon = perUn * pw;
      tx += `\n*Total do período:  ${perTon.toLocaleString("pt-BR")} mt*\n`;
      tx += `Total  embarcado: ${c.eTon.toLocaleString("pt-BR")} mt (breakdown ${c.plan.toLocaleString("pt-BR")} mt)\n`;
      tx += `Saldo: ${c.sTon.toLocaleString("pt-BR")} mt\n\n`;
      if (c.etc) {
        const etcD = c.etc.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "2-digit" });
        const etcH = c.etc.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
        tx += `ETC: ${etcD} - ${etcH} AGW WP`;
      }
      setCopyText(tx);
    } catch (err) {
      console.error(err);
      fl("Erro: " + (err.message || "falha ao gerar"));
    }
  }

  // ── Actions ──
  function setNT(n) {
    const s = JSON.parse(JSON.stringify(ship));
    s.numTernos = n;
    while (s.ternos.length < n) s.ternos.push({ id: uid(), nome: s.ternos.length + 1 + "º Terno" });
    while (s.ternos.length > n) s.ternos.pop();
    s.periodos.forEach(p => p.linhas.forEach(l => {
      while (l.td.length < n) l.td.push({ tid: s.ternos[l.td.length]?.id, un: 0, ca: 0, porId: null, extra: [] });
      while (l.td.length > n) l.td.pop();
      l.td.forEach((x, i) => x.tid = s.ternos[i]?.id);
    }));
    sv(s);
  }

  function addPor() {
    const s = JSON.parse(JSON.stringify(ship));
    const num = s.poroes.length + 1;
    s.poroes.push({ id: uid(), nome: "Porão #" + num, un: 0 });
    sv(s);
  }

  function addPer() {
    const s = JSON.parse(JSON.stringify(ship));
    const d = new Date().toISOString().slice(0, 10);
    const nx = s.periodos.length > 0 ? PERIODOS[(PERIODOS.indexOf(s.periodos[s.periodos.length - 1].periodo) + 1) % 4] : PERIODOS[0];
    const eq = getEquipe(d, nx);
    s.periodos.push({ id: uid(), data: d, periodo: nx, equipe: eq, guincheiros: {}, linhas: mkLinhas(nx, s.ternos) });
    sv(s);
  }

  function updCell(pi, li, ti, f, v) {
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[pi].linhas[li].td[ti][f] = f === "porId" ? (v || null) : (parseInt(v) || 0);
    sv(s);
  }

  function addExtra(pi, li, ti) {
    const s = JSON.parse(JSON.stringify(ship));
    const td = s.periodos[pi].linhas[li].td[ti];
    if (!td.extra) td.extra = [];
    if (td.extra.length >= 2) return;
    td.extra.push({ porId: null, un: 0, ca: 0 });
    sv(s);
  }

  function updExtra(pi, li, ti, ei, f, v) {
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[pi].linhas[li].td[ti].extra[ei][f] = f === "porId" ? (v || null) : (parseInt(v) || 0);
    sv(s);
  }

  function rmExtra(pi, li, ti, ei) {
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[pi].linhas[li].td[ti].extra.splice(ei, 1);
    sv(s);
  }

  function openDm(pi, li) {
    setDmC("SM"); setDmD("Safety Meeting (DDS)"); setDmT("Geral");

  function saveDm() {
    if (!dm) return;
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[dm.pi].linhas[dm.li].pars.push({ id: uid(), cod: dmC, desc: dmD, terno: dmT, ini: dmI, fim: dmF, min: dmM });
    sv(s); setDm(null); fl("Registrado");
  }

  function rmPar(pi, li, pid) {
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[pi].linhas[li].pars = s.periodos[pi].linhas[li].pars.filter(p => p.id !== pid);
    sv(s);
  }

  function openGm(pi) {
    if (!ship) return;
    const v = {};
    ship.ternos.forEach(tn => v[tn.id] = ship.periodos[pi]?.guincheiros?.[tn.id] || "");
    setGv(v); setGm({ pi });
  }

  function saveGm() {
    if (!gm) return;
    const s = JSON.parse(JSON.stringify(ship));
    s.periodos[gm.pi].guincheiros = { ...gv };
    sv(s); setGm(null); fl("Salvo!");
  }

  function finalizar() {
    if (!ship) return;
    svH([{ ...ship, finAt: new Date().toISOString(), res: calc(ship) }, ...hist]);
    setShip(null); sSet("sp3-ship", null); setVw("home"); fl("Finalizado!");
  }

  function dmCalc() {
    if (dmI && dmF) {
      const [h1, m1] = dmI.split(":").map(Number);
      const [h2, m2] = dmF.split(":").map(Number);
      let d = (h2 * 60 + m2) - (h1 * 60 + m1);
      if (d < 0) d += 1440;
      setDmM(d);
    }
  }

                            <td key={ln.id + tn.id + "c"} style={cellS}>

                              </div>
                              {extras.map((ex, ei) => (

                                </div>
                              ))}
                            </td>,

                        }).flat()}

                        <td style={{ padding: "2px", textAlign: "center", verticalAlign: "top" }}>
                          <button onClick={() => openDm(pi, li)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, opacity: .7, padding: "4px 0" }}>＋</button>
                        </td>
                      </tr>,
                      hasPars && (
                        <tr key={ln.id + "pars"} style={{ background: bg }}>
                          <td style={{ borderRight: `1px solid ${t.brd}` }} />
                          {ship.ternos.map((tn, ti) => {
                            const tp = parsForTerno(ti);
                            const gp = ti === 0 ? parsGeral : [];
                            const all = [...gp, ...tp];
                            return (
                              <td key={ln.id + tn.id + "pars"} colSpan={4} style={{ padding: "1px 3px 4px", verticalAlign: "top", borderLeft: `1px solid ${t.brd}` }}>

                  {/* Totals row */}
                  <tr style={{ background: t.accL, borderTop: `2px solid ${t.acc}` }}>
                    <td style={{ padding: "8px 2px", textAlign: "center", fontWeight: 800, fontSize: 13, color: t.acc }}>TOTAL</td>
                    {ship.ternos.map(tn => {

                      return [
                        <td key={"pt" + tn.id + "p"} style={{ borderLeft: `1px solid ${t.brd}` }} />,

  // ══════ CHART ══════
  function rChart() {
    if (!ship || !ship.poroes || !ship.poroes.length) return <div style={{ ...S.crd, textAlign: "center", color: t.mut, fontSize: 12 }}>Cadastre porões para ver o gráfico.</div>;
    const data = porPerf(ship);
    const maxM = Math.max(...data.map(d => d.mH), 1);
    const maxT = Math.max(...data.map(d => d.tH), 1);
    return (
      <div style={S.crd}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>📊 Performance por Porão</div>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.mut, marginBottom: 6 }}>MOV/HORA (un/h)</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100, marginBottom: 16 }}>
          {data.map(d => (
            <div key={d.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: t.acc, marginBottom: 2 }}>{d.mH.toFixed(1)}</div>
              <div style={{ width: "100%", maxWidth: 36, background: `linear-gradient(180deg,${t.t1},${t.acc})`, borderRadius: "4px 4px 0 0", height: `${Math.max((d.mH / maxM) * 80, 4)}%` }} />
              <div style={{ fontSize: 8, color: t.mut, marginTop: 3, fontWeight: 600 }}>{d.nome.replace("Porão ", "#")}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 10, fontWeight: 700, color: t.mut, marginBottom: 6 }}>TON/HORA (mt/h)</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100 }}>
          {data.map(d => (
            <div key={d.id + "t"} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: t.ok, marginBottom: 2 }}>{d.tH.toFixed(1)}</div>
              <div style={{ width: "100%", maxWidth: 36, background: `linear-gradient(180deg,${t.t2},${t.ok})`, borderRadius: "4px 4px 0 0", height: `${Math.max((d.tH / maxT) * 80, 4)}%` }} />
              <div style={{ fontSize: 8, color: t.mut, marginTop: 3, fontWeight: 600 }}>{d.nome.replace("Porão ", "#")}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ══════ BALANCE ══════
  function rBalance() {
    if (!ship) return null;
    const pw = ship.pesoUn || 2;
    // Calc planned per terno (sum of perTerno across all porões)
    const ternoPlan = {};
    ship.ternos.forEach(tn => {
      let plan = 0;
      (ship.poroes || []).forEach(po => {
        plan += (po.perTerno && po.perTerno[tn.id]) || 0;
      });
      ternoPlan[tn.id] = plan * pw; // in tons
    });
    // Calc realized per terno
    const ternoReal = {};
    ship.ternos.forEach(tn => {
      const tt = tTot(ship, tn.id);
      ternoReal[tn.id] = tt.ton;
    });
    // Find max for chart scaling
    const allVals = [...Object.values(ternoPlan), ...Object.values(ternoReal)];
    const maxVal = Math.max(...allVals, 1);
    // Calc difference between ternos
    const saldos = ship.ternos.map(tn => ternoPlan[tn.id] - ternoReal[tn.id]);
    const maxSaldo = Math.max(...saldos);
    const minSaldo = Math.min(...saldos);
    const diff = maxSaldo - minSaldo;

    return (
      <div style={S.crd}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14 }}>⚖️ Balance — Equilíbrio entre Ternos</div>
        {/* Bars per terno */}
        <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 16 }}>
          {ship.ternos.map((tn, ti) => {
            const plan = ternoPlan[tn.id] || 0;
            const real = ternoReal[tn.id] || 0;
            const saldo = plan - real;
            const pctDone = plan > 0 ? (real / plan) * 100 : 0;
            const planH = maxVal > 0 ? Math.min((plan / maxVal) * 140, 130) : 0;
            const realH = maxVal > 0 ? Math.min((real / maxVal) * 140, 130) : 0;
            return (
              <div key={tn.id} style={{ flex: 1, maxWidth: 160, textAlign: "center" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: tc(ti), marginBottom: 16 }}>{tn.nome}</div>
                {/* Bar chart */}
                <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "flex-end", height: 170 }}>
                  {/* Planned bar */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                    <div style={{ fontSize: 9, fontWeight: 600, color: t.mut, marginBottom: 2 }}>{plan.toLocaleString("pt-BR")}</div>
                    <div style={{ width: 28, height: planH, background: t.brd, borderRadius: "4px 4px 0 0", transition: "height .5s" }} />
                    <div style={{ fontSize: 8, color: t.mut, marginTop: 3 }}>Plan.</div>
                  </div>
                  {/* Realized bar */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                    <div style={{ fontSize: 9, fontWeight: 700, color: tc(ti), marginBottom: 2 }}>{real.toLocaleString("pt-BR")}</div>
                    <div style={{ width: 28, height: realH, background: tc(ti), borderRadius: "4px 4px 0 0", transition: "height .5s" }} />
                    <div style={{ fontSize: 8, color: t.mut, marginTop: 3 }}>Real.</div>
                  </div>
                </div>
                {/* Stats below */}
                <div style={{ marginTop: 8, padding: "6px 8px", background: t.cAlt, borderRadius: 6 }}>
                  <div style={{ fontSize: 10, color: t.mut }}>Saldo: <strong style={{ color: saldo > 0 ? t.warn : t.ok }}>{saldo.toLocaleString("pt-BR")} mt</strong></div>
                  <div style={{ fontSize: 10, color: t.mut }}>{pctDone.toFixed(1)}% concluído</div>
                </div>
              </div>
            );
          })}
        </div>
        {/* Difference indicator */}
        {ship.ternos.length > 1 && diff > 0 && (
          <div style={{ textAlign: "center", padding: "8px 12px", borderRadius: 8, background: diff > (maxVal * 0.1) ? t.warn + "22" : t.ok + "22", fontSize: 11 }}>
            <span style={{ fontWeight: 700, color: diff > (maxVal * 0.1) ? t.warn : t.ok }}>
              {diff > (maxVal * 0.1) ? "⚠️" : "✅"} Diferença entre ternos: {diff.toLocaleString("pt-BR")} mt
            </span>
            {diff > (maxVal * 0.1) && <div style={{ fontSize: 10, color: t.mut, marginTop: 2 }}>Considerar remanejamento de carga</div>}
          </div>
        )}
      </div>
    );
  }

      <div style={S.cnt}>
        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>📁 Histórico</div>

        {hist.map((h, i) => (
          <div key={h.id || i} style={{ ...S.crd, cursor: "pointer" }} onClick={() => { setHDet(h); setVw("hdet"); }}>

              <div><div style={{ fontWeight: 700 }}>🚢 {h.navio}</div><div style={{ fontSize: 11, color: t.mut }}>V.{h.viagem} · {new Date(h.createdAt).toLocaleDateString("pt-BR")}</div></div>

  function rHDet() {
    if (!hDet) return null;
    const c = hDet.res || calc(hDet);
    return (
      <div style={S.cnt}>
        <div style={S.crd}>
          <div style={{ fontSize: 16, fontWeight: 800 }}>🚢 {hDet.navio}</div>
          <div style={{ fontSize: 12, color: t.mut }}>V.{hDet.viagem} · {hDet.produto}</div>
          <div style={{ ...S.g4, marginTop: 12 }}>
            <div style={{ textAlign: "center" }}><div style={S.stV}>{(c.emb || 0).toLocaleString("pt-BR")}</div><div style={S.stL}>Embarcado</div></div>
            <div style={{ textAlign: "center" }}><div style={S.stV}>{(c.eTon || 0).toLocaleString("pt-BR")}</div><div style={S.stL}>Toneladas</div></div>
            <div style={{ textAlign: "center" }}><div style={S.stV}>{c.ca || 0}</div><div style={S.stL}>Autos</div></div>
            <div style={{ textAlign: "center" }}><div style={{ ...S.stV, color: t.ok }}>{(c.mH || 0).toFixed(1)}</div><div style={S.stL}>Mov/h</div></div>
          </div>
        </div>
        <button style={{ ...S.btn(t.acc, "#FFF"), width: "100%", justifyContent: "center" }}
          onClick={() => { navigator.clipboard?.writeText(genTx(hDet)).then(() => fl("Copiado!")); }}>📋 Copiar</button>
      </div>
    );
  }

  // ══════ MODALS ══════
  function rDmModal() {
    if (!dm) return null;
    return (
      <div style={S.modal} onClick={() => setDm(null)}>
        <div style={S.modalC} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>⚠️ Registrar Paralisação</div>
          <label style={S.lbl}>Código</label>
          <select value={dmC} onChange={e => { setDmC(e.target.value); setDmD(DELAYS.find(x => x.c === e.target.value)?.d || ""); }} style={{ ...S.sel, marginBottom: 8 }}>
            {DELAYS.map(d => <option key={d.c} value={d.c}>{d.c}</option>)}
          </select>
          <label style={S.lbl}>Descrição (editável)</label>
          <input value={dmD} onChange={e => setDmD(e.target.value)} style={{ ...S.inp, marginBottom: 8 }} />
          <label style={S.lbl}>Terno</label>
          <select value={dmT} onChange={e => setDmT(e.target.value)} style={{ ...S.sel, marginBottom: 8 }}>
            <option value="Geral">Geral</option>
            {ship?.ternos.map(tn => <option key={tn.id} value={tn.nome}>{tn.nome}</option>)}
          </select>
          <div style={S.g3}>
            <div><label style={S.lbl}>Início</label><input type="time" value={dmI} onChange={e => setDmI(e.target.value)} onBlur={dmCalc} style={S.inp} /></div>
            <div><label style={S.lbl}>Fim</label><input type="time" value={dmF} onChange={e => setDmF(e.target.value)} onBlur={dmCalc} style={S.inp} /></div>
            <div><label style={S.lbl}>Total (min)</label><input type="number" value={dmM} onChange={e => setDmM(parseInt(e.target.value) || 0)} style={S.inp} /></div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button style={S.btn(t.acc, "#FFF")} onClick={saveDm}>Salvar</button>
            <button style={S.btn("transparent", t.mut)} onClick={() => setDm(null)}>Cancelar</button>
          </div>
        </div>
      </div>
    );
  }

  function rGmModal() {
    if (!gm || !ship) return null;
    return (
      <div style={S.modal} onClick={() => setGm(null)}>
        <div style={S.modalC} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>👷 Guincheiros — Período {ship.periodos[gm.pi]?.periodo}</div>
          {ship.ternos.map(tn => (
            <div key={tn.id} style={{ marginBottom: 10 }}>
              <label style={S.lbl}>{tn.nome}</label>
              <input value={gv[tn.id] || ""} onChange={e => setGv({ ...gv, [tn.id]: e.target.value })} placeholder="Nome do guincheiro" style={S.inp} />
            </div>
          ))}
          <button style={S.btn(t.acc, "#FFF")} onClick={saveGm}>Salvar</button>
        </div>
      </div>
    );
  }

  function rCopyModal() {
    if (!copyText) return null;
    return (
      <div style={S.modal} onClick={() => setCopyText(null)}>
        <div style={S.modalC} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 15, fontWeight: 700 }}>📋 Relatório Cliente</div>
            <button onClick={() => setCopyText(null)} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: t.mut }}>×</button>
          </div>
          <textarea
            readOnly
            value={copyText}
            onFocus={e => e.target.select()}
            style={{ width: "100%", minHeight: 200, padding: 12, borderRadius: 8, border: `1px solid ${t.iBrd}`, background: t.iBg, color: t.tx, fontSize: 12, fontFamily: "monospace", resize: "vertical", boxSizing: "border-box", outline: "none" }}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            <button style={S.btn(t.acc, "#FFF")} onClick={() => {
              try { navigator.clipboard.writeText(copyText).then(() => { fl("📋 Copiado!"); setCopyText(null); }).catch(() => fl("Selecione o texto e copie manualmente")); }
              catch { fl("Selecione o texto e copie manualmente"); }
            }}>📋 Copiar</button>
            <button style={{ ...S.btn(t.card, t.tx), border: `1px solid ${t.brd}` }} onClick={() => setCopyText(null)}>Fechar</button>
          </div>
        </div>
      </div>
    );
  }

  // ══════ MAIN ══════
  if (load) return (
    <div style={{ ...S.page, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}>
      <div style={{ textAlign: "center" }}><div style={{ fontSize: 32 }}>🚢</div><div style={{ color: t.mut, marginTop: 8 }}>Carregando...</div></div>
    </div>
  );

  return (
    <div style={S.page}>
      <div style={S.hdr}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 16, fontWeight: 700 }}>
          {vw !== "home" && <button onClick={() => setVw(vw === "hdet" ? "history" : "home")} style={{ background: "none", border: "none", color: t.hTx, cursor: "pointer", fontSize: 18, padding: 0 }}>←</button>}
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="rgba(255,255,255,.15)" /><text x="8" y="24" fontFamily="Arial Black" fontSize="18" fontWeight="900" fill="#FFF">P</text><path d="M4 32Q12 28 20 32Q28 36 36 32" stroke={t.cy} strokeWidth="2" fill="none" opacity=".8" /><path d="M4 35Q12 31 20 35Q28 39 36 35" stroke={t.li} strokeWidth="1.5" fill="none" opacity=".6" /></svg>
          <span>Ship ProdTracker</span>
        </div>
        <button onClick={togTm} style={{ background: "rgba(255,255,255,.15)", border: "none", borderRadius: 6, padding: "4px 10px", color: t.hTx, cursor: "pointer", fontSize: 14 }}>
          {tm === "light" ? "🌙" : "☀️"}
        </button>
      </div>

      {vw === "home" && rHome()}
      {vw === "new" && rNew()}
      {vw === "active" && rActive()}
      {vw === "history" && rHist()}
      {vw === "hdet" && rHDet()}

      {rDmModal()}
      {rGmModal()}
      {rCopyModal()}

      <div style={S.toastS(!!toast)}>{toast}</div>

      <svg style={{ position: "fixed", bottom: 0, left: 0, right: 0, pointerEvents: "none", opacity: .12 }} viewBox="0 0 1200 60" preserveAspectRatio="none" height="35">
        <path d="M0 30Q150 0 300 30Q450 60 600 30Q750 0 900 30Q1050 60 1200 30V60H0Z" fill={t.cy} />
        <path d="M0 40Q150 15 300 40Q450 65 600 40Q750 15 900 40Q1050 65 1200 40V60H0Z" fill={t.li} opacity=".5" />
      </svg>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
